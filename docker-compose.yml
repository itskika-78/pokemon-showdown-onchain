# Full stack for the Pokémon cNFT Battler — `docker compose up` starts everything.
# Postgres = source of truth. Redis = matchmaking queue, battle-room state,
# per-turn timers, SIWS nonces, Socket.IO adapter.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: battler
      POSTGRES_PASSWORD: battler
      POSTGRES_DB: battler
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U battler']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  battle-service:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    command: ['pnpm', '--filter', '@battler/battle-service', 'start']
    environment:
      NODE_ENV: development
      SERVICE_NAME: battle-service
      DATABASE_URL: postgres://battler:battler@postgres:5432/battler
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL:-}
      HELIUS_DEVNET_RPC_URL: ${HELIUS_DEVNET_RPC_URL:-}
      PHYGITALS_COLLECTION_MINTS: ${PHYGITALS_COLLECTION_MINTS:-BSG6DyEihFFtfvxtL9mKYsvTwiZXB1rq5gARMTJC2xAM}
      TREASURY_WALLET: ${TREASURY_WALLET:-}
      WEB_ORIGIN: http://localhost:3000
      BATTLE_SERVICE_PORT: '3001'
      PLATFORM_FEE_BPS: '250'
    ports:
      - '3001:3001'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    command: ['pnpm', '--filter', '@battler/web', 'dev']
    environment:
      NODE_ENV: development
      SERVICE_NAME: web
      DATABASE_URL: postgres://battler:battler@postgres:5432/battler
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL:-}
      HELIUS_DEVNET_RPC_URL: ${HELIUS_DEVNET_RPC_URL:-}
      PHYGITALS_COLLECTION_MINTS: ${PHYGITALS_COLLECTION_MINTS:-BSG6DyEihFFtfvxtL9mKYsvTwiZXB1rq5gARMTJC2xAM}
      TREASURY_WALLET: ${TREASURY_WALLET:-}
      SIWS_DOMAIN: localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_HELIUS_RPC_URL: https://api.mainnet-beta.solana.com
      NEXT_PUBLIC_HELIUS_DEVNET_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_ENABLE_POKEMON_ART: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
